<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Z-City Loading</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="backdrop"></div>
  <main class="shell">
    <section class="brand-card">
      <div class="badge">Z-City</div>
      <img class="logo" src="./assets/zcity_loading.gif" alt="Z-City loading animation">
      <h1 id="server-name">Z-City Aftermath RP</h1>
      <p id="server-mode">Preparing DarkRP session...</p>
    </section>

    <section class="details-card">
      <div class="row">
        <span class="label">Map</span>
        <span class="value" id="map-name">Loading...</span>
      </div>
      <div class="row">
        <span class="label">Gamemode</span>
        <span class="value" id="gamemode-name">Z-City / DarkRP</span>
      </div>
      <div class="row">
        <span class="label">Status</span>
        <span class="value" id="status-text">Connecting to server...</span>
      </div>
      <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="hint">Money, trader catalog and staff loadout are initialized server-side. The public URL for this page is configured later through <code>sv_loadingurl</code>.</p>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
